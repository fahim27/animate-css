<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .conainer {
            width: 1200px;
            margin: 50px auto;
        }

        .team {
            width: 380px;
            float: left;
            height: 400px;
            margin-right: 20px;
            background-color: rgb(25, 151, 88);
            position: relative;
        }

        .team img {
            width: 100%;
            height: 98%;
            box-shadow: 7px 9px 10px #ddd;
        }

        h1 {
            text-transform: uppercase;
            margin-bottom: 30px;
            color: orange;
        }




        .team img:hover {
            opacity: 0.5;
        }

        .team p {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            border: 1px solid #fff;
            padding: 10px;

        }

        .team:hover p {
            transform: translate(-50%, -50%) scale(1);

        }

        .team * {
            transition: all .5s ease-in-out;
        }
    </style>
</head>

<body>
    <div class="conainer">
        <h1>meet our team</h1>

        <div class="team">
            <img src="https://cdn.pixabay.com/photo/2015/08/05/04/25/people-875617_960_720.jpg" alt="">

            <p>Alex,CEO</p>

        </div>


        <div class="team">
            <img src="https://images.pexels.com/photos/1680172/pexels-photo-1680172.jpeg?auto=compress&cs=tinysrgb&dpr=3&h=750&w=1260"
                alt="">

            <p>James,Founder</p>

        </div>


        <div class="team">
            <img src="https://images.pexels.com/photos/3863793/pexels-photo-3863793.jpeg?auto=compress&cs=tinysrgb&h=750&w=1260"
                alt="">

            <p>Alex,CEO</p>

        </div>

    </div>
</body>

</html>
